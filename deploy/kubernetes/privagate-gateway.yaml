apiVersion: v1
kind: Namespace
metadata:
  name: privagate-gateway
---
apiVersion: v1
kind: Secret
metadata:
  name: privagate-gateway-secrets
  namespace: privagate-gateway
type: Opaque
stringData:
  PRIVAGATE_HMAC_KEY: replace-with-cluster-secret
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: privagate-gateway-policy
  namespace: privagate-gateway
data:
  policy.sample.json: |
    {
      "policy_version": "cluster-policy-placeholder",
      "task_profile": "contract_risk_review",
      "key_domain": "local-kms/privagate-gateway/hmac/v1",
      "fields": {},
      "constraints": {},
      "statistics": []
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: privagate-gateway-data
  namespace: privagate-gateway
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: privagate-gateway
  namespace: privagate-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: privagate-gateway
  template:
    metadata:
      labels:
        app: privagate-gateway
    spec:
      containers:
        - name: privagate-gateway
          image: privagate-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PRIVAGATE_BIND
              value: 0.0.0.0:8080
            - name: PRIVAGATE_POLICY_PATH
              value: /app/config/policy.sample.json
            - name: PRIVAGATE_MAPPING_LOG
              value: /app/data/local-mappings.jsonl
            - name: PRIVAGATE_AUDIT_LOG
              value: /app/data/audit.jsonl
            - name: PRIVAGATE_REVIEW_MODE
              value: off
            - name: PRIVAGATE_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: privagate-gateway-secrets
                  key: PRIVAGATE_HMAC_KEY
          volumeMounts:
            - name: policy
              mountPath: /app/config
              readOnly: true
            - name: data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
      volumes:
        - name: policy
          configMap:
            name: privagate-gateway-policy
        - name: data
          persistentVolumeClaim:
            claimName: privagate-gateway-data
---
apiVersion: v1
kind: Service
metadata:
  name: privagate-gateway
  namespace: privagate-gateway
spec:
  type: ClusterIP
  selector:
    app: privagate-gateway
  ports:
    - port: 8080
      targetPort: 8080
