name: Bug Report
description: Report a reproducible bug using synthetic data only.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please use synthetic data only. Do not paste real personal, customer, patient, employee, account, medical, financial, security, or proprietary data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal commands, request body, or synthetic test case.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - privagate-core
        - privagate-gateway
        - policy
        - detector
        - verification
        - documentation
        - deployment
        - external-api-simulation
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Rust version, command used, and relevant configuration.
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Data Safety
      options:
        - label: I confirm this issue contains synthetic data only.
          required: true
