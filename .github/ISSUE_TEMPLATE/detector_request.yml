name: Detector Request
description: Request or propose a new synthetic-data detector.
title: "[Detector]: "
labels: ["detector", "help wanted"]
body:
  - type: input
    id: identifier
    attributes:
      label: Identifier Type
      description: Example types: SSN, IBAN-like account, invoice number, hostname, IPv6.
    validations:
      required: true
  - type: textarea
    id: synthetic_examples
    attributes:
      label: Synthetic Positive Examples
      description: Use synthetic examples only.
      render: text
    validations:
      required: true
  - type: textarea
    id: negative_examples
    attributes:
      label: Negative Examples
      description: Values that should not match.
      render: text
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: Risk and Utility Notes
      description: False positives, false negatives, and task utility impact.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Data Safety
      options:
        - label: I confirm all examples are synthetic.
          required: true
