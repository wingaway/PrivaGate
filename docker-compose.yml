services:
  privagate-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PRIVAGATE_BIND: 0.0.0.0:8080
      PRIVAGATE_POLICY_PATH: /app/config/policy.sample.json
      PRIVAGATE_MAPPING_LOG: /app/data/local-mappings.jsonl
      PRIVAGATE_AUDIT_LOG: /app/data/audit.jsonl
      PRIVAGATE_AUDIT_POSTGRES_URL: ${PRIVAGATE_AUDIT_POSTGRES_URL:-}
      PRIVAGATE_REVIEW_MODE: ${PRIVAGATE_REVIEW_MODE:-off}
      PRIVAGATE_HMAC_KEY: ${PRIVAGATE_HMAC_KEY:?set local secret}
      CARGO_HOME: /workspace/.cargo-home
      CARGO_TARGET_DIR: /workspace/target
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./.cargo-home:/workspace/.cargo-home
      - ./target:/workspace/target
